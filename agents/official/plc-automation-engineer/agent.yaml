apiVersion: supportai/v1
kind: Agent
metadata:
  id: plc-automation-engineer
  name: PLC Automation Engineer
  nameEN: PLC Automation Engineer
  version: 1.1.0
  author: supportai-team
  license: Apache-2.0
  tags: [plc, automation, ladder, structured-text, hmi, pid, tia-portal, codesys, scada, industrial-control]
  avatar: PL
  color: "#2563eb"
  category: development
  maturity: official
  minRuntime: node

spec:
  identity:
    systemPromptFile: system.md
    personality: professional
    language: [tr, en]
    description: >
      Saha duzeyinde PLC, HMI, SCADA otomasyon muhendisi. Otomasyoncu gibi tek soru sorar
      veya dogrudan TIA Portal kalitesinde ladder uretir. Cikti 4 katmanli: ASCII ladder
      (adres + sembolik isim cift satir etiketi), SVG cizim, vendor-bagimsiz JSON ve
      vendor-spesifik XML/IL export. 9 vendor: Siemens TIA Portal, Rockwell Studio 5000,
      Mitsubishi GX Works, Omron Sysmac, Schneider EcoStruxure, Beckhoff TwinCAT, CODESYS,
      Delta WPLSoft/ISPSoft, Fatek. HMI SVG + tag tablosu, PID tuning ve simulasyon trace.
  capabilities:
    reasoning: react
    maxSteps: 160
    memory:
      type: summary
      maxTokens: 256000
    streaming: true
    multiModal: true
  models:
    preferred:
      - claude-opus-4-7
      - gpt-5.4
      - grok-4.3
    minimum: deepseek-v4-pro
    fallback: auto
    temperature: 0.15
    maxOutputTokens: 64000
  tools:
    - $ref: tools/web-search
    - $ref: tools/file-reader
    - name: io-map-builder
      type: builtin
      description: Builds PLC input/output maps, addressing tables, and wiring assumptions per vendor (Siemens %I0.0, Rockwell Local:1:I, Mitsubishi X0, Omron 0.00, etc.).
      permissions: [read]
    - name: plc-program-planner
      type: builtin
      description: Produces ladder ASCII (TIA Portal style with address + symbolic name double label), SVG ladder drawings, vendor-agnostic JSON (supportai.plc.v1 schema), vendor-specific XML/IL exports (TIA OpenXML, Studio 5000 L5X, PLCopen XML, GX Works IL), structured text, function block plans, and test procedures.
      permissions: [read, write]
    - name: hmi-screen-builder
      type: builtin
      description: Generates HMI operator screens as SVG wireframes with tag/alarm tables for KTP, PanelView, GOT, NB/NA, Magelis panels.
      permissions: [read, write]
    - name: pid-tuner
      type: builtin
      description: Produces PID_Compact / PIDE / vendor PID blocks with Kp/Ti/Td values and Ziegler-Nichols / Cohen-Coon tuning rationale for temperature, pressure, level, flow loops.
      permissions: [read]
    - name: simulation-tracer
      type: builtin
      description: Step-by-step PLC simulation trace (t=0..N with input/memory/output bit states) for verifying ladder behavior before commissioning.
      permissions: [read]
    - name: safety-checklist
      type: builtin
      description: Validates emergency stop, safety chain (PL d / SIL 2), interlocks, fail-safe states, sensor timeouts, and commissioning risks.
      permissions: [read]
  permissions:
    read: full
    write: approved
    network: full
    execute: approved
    mcp: approved
    social: none
    system: approved
  lifecycle:
    longRunning: true
    resumable: true
    budgetPolicy: quota-bound
    checkpointIntervalSeconds: 120
    heartbeatSeconds: 30
    communicationFiles:
      - AGENT_PLAN.md
      - QUESTIONS.md
      - RESEARCH_NOTES.md
      - IO_MAP.md
      - PLC_PROGRAM.md
      - PROGRAM_JSON.md
      - PROGRAM_XML.md
      - LADDER_SVG.md
      - HMI_PLAN.md
      - PID_TUNING.md
      - SIMULATION.md
      - VALIDATION.md
      - TEST_PLAN.md
      - FINAL_DELIVERY.md
  riskLevel: high
  rootApprovalRequired: true
  governance:
    maxExecutionTime: 86400
    maxApiCalls: 2000
    maxTokenBudget: 8000000
    sandboxed: true
    allowedDomains:
      - "*.siemens.com"
      - "support.industry.siemens.com"
      - "*.rockwellautomation.com"
      - "*.omron.com"
      - "*.mitsubishielectric.com"
      - "*.schneider-electric.com"
      - "*.beckhoff.com"
      - "infosys.beckhoff.com"
      - "*.phoenixcontact.com"
      - "*.wago.com"
      - "*.codesys.com"
      - "*.delta.com.tw"
      - "*.fatek.com"
      - "*.github.com"
      - "oscat.de"
      - "mrplc.com"
      - "plcs.net"
      - "plcfiddle.com"
      - "realpars.com"
      - "plcacademy.com"
      - "plcopen.org"
    dataRetention: session
    humanApproval:
      required: true
      forActions:
        - plc-program-write
        - terminal-command
        - external-tool
        - safety-critical-output
        - hardware-io-map
        - vendor-xml-export
        - hmi-screen-deploy
  io:
    input:
      accepts: [text, code, file, image, url]
      maxFileSize: 100MB
    output:
      formats: [markdown, code, json, csv, artifact, image]
      artifacts: true
