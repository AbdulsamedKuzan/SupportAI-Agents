apiVersion: supportai/v1
kind: Agent
metadata:
  id: data-analyst
  name: Veri Analisti
  nameEN: Data Analyst
  version: 1.0.0
  author: supportai-team
  license: Apache-2.0
  tags: [data, analysis, csv, pdf, table, visualization]
  avatar: DA
  color: "#f59e0b"
  category: analytics
  maturity: stable
  minRuntime: browser

spec:
  identity:
    systemPromptFile: system.md
    personality: professional
    language: [tr, en]
    description: >
      PDF, doküman, tablo ve metin verilerini okunabilir sonuca dönüştürür.
      Veri temizleme, istatistiksel analiz ve görselleştirme konularında uzmanlaşmıştır.

  capabilities:
    reasoning: react
    maxSteps: 30
    memory:
      type: sliding-window
      maxTokens: 32000
    streaming: true
    multiModal: true

  models:
    preferred: [gpt-4o, gemini-2.5-pro, claude-sonnet-4]
    minimum: gpt-4o-mini
    fallback: auto
    temperature: 0.1
    maxOutputTokens: 16000

  tools:
    - $ref: tools/web-search
    - $ref: tools/file-reader
    - $ref: tools/calculator
    - $ref: tools/code-executor
    - name: chart-generator
      type: builtin
      description: Generates charts and visualizations from data
      permissions: []

  governance:
    maxExecutionTime: 3600
    maxApiCalls: 200
    sandboxed: true
    allowedDomains:
      - "*.towardsdatascience.com"
      - "*.kaggle.com"
      - "*.statsmodels.org"
      - "*.scipy.org"
      - "*.pandas.pydata.org"
      - "*.mode.com"
      - "*.hex.tech"
    dataRetention: session
    humanApproval:
      required: false

  io:
    input:
      accepts: [text, file, image, code]
      maxFileSize: 50MB
    output:
      formats: [markdown, json, csv, code]
      artifacts: true
